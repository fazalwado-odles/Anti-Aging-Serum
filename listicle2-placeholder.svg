<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="citrus-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#F59E0B" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#D97706" stop-opacity="0.7" />
    </linearGradient>
    <radialGradient id="glow-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFBEB" stop-opacity="1" />
      <stop offset="70%" stop-color="#FEF3C7" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#FDFBF7" stop-opacity="0" />
    </radialGradient>
    <filter id="soft-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" />
    </filter>
  </defs>

  <circle cx="250" cy="250" r="200" fill="url(#glow-grad)" filter="url(#soft-blur)" />
  
  <!-- Stylized Orange/Lemon slice outline -->
  <g transform="translate(250, 250)">
    <circle cx="0" cy="0" r="140" fill="none" stroke="url(#citrus-grad)" stroke-width="2.5" />
    <circle cx="0" cy="0" r="128" fill="none" stroke="url(#citrus-grad)" stroke-width="1.5" stroke-dasharray="2 4" />
    
    <!-- Segments -->
    <path d="M 0,0 L 0,-115 A 115,115 0 0,1 81.3,-81.3 Z" fill="none" stroke="url(#citrus-grad)" stroke-width="1.5" stroke-linejoin="round" />
    <path d="M 0,0 L 81.3,-81.3 A 115,115 0 0,1 115,0 Z" fill="none" stroke="url(#citrus-grad)" stroke-width="1.5" stroke-linejoin="round" />
    <path d="M 0,0 L 115,0 A 115,115 0 0,1 81.3,81.3 Z" fill="none" stroke="url(#citrus-grad)" stroke-width="1.5" stroke-linejoin="round" />
    <path d="M 0,0 L 81.3,81.3 A 115,115 0 0,1 0,115 Z" fill="none" stroke="url(#citrus-grad)" stroke-width="1.5" stroke-linejoin="round" />
    <path d="M 0,0 L 0,115 A 115,115 0 0,1 -81.3,81.3 Z" fill="none" stroke="url(#citrus-grad)" stroke-width="1.5" stroke-linejoin="round" />
    <path d="M 0,0 L -81.3,81.3 A 115,115 0 0,1 -115,0 Z" fill="none" stroke="url(#citrus-grad)" stroke-width="1.5" stroke-linejoin="round" />
    <path d="M 0,0 L -115,0 A 115,115 0 0,1 -81.3,-81.3 Z" fill="none" stroke="url(#citrus-grad)" stroke-width="1.5" stroke-linejoin="round" />
    <path d="M 0,0 L -81.3,-81.3 A 115,115 0 0,1 0,-115 Z" fill="none" stroke="url(#citrus-grad)" stroke-width="1.5" stroke-linejoin="round" />
    
    <circle cx="0" cy="0" r="15" fill="#FFF" stroke="url(#citrus-grad)" stroke-width="2" />
  </g>
</svg>
