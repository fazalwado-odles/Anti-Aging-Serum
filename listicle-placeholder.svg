<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5C7A3" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#C5A880" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#A88B62" stop-opacity="0.7" />
    </linearGradient>
    <radialGradient id="glow-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F9F6F0" stop-opacity="1" />
      <stop offset="70%" stop-color="#F5EFEB" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#FDFBF7" stop-opacity="0" />
    </radialGradient>
    <filter id="soft-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" />
    </filter>
  </defs>

  <!-- Soft background glow -->
  <circle cx="250" cy="250" r="200" fill="url(#glow-grad)" filter="url(#soft-blur)" />

  <!-- Concentric radiating rings (representing skin layers/glow) -->
  <circle cx="250" cy="250" r="160" fill="none" stroke="url(#gold-grad)" stroke-width="1" stroke-dasharray="4 8" opacity="0.4" />
  <circle cx="250" cy="250" r="120" fill="none" stroke="url(#gold-grad)" stroke-width="1.5" opacity="0.6" />
  <circle cx="250" cy="250" r="80" fill="none" stroke="url(#gold-grad)" stroke-width="2" opacity="0.8" />
  <circle cx="250" cy="250" r="40" fill="none" stroke="url(#gold-grad)" stroke-width="1" opacity="0.5" />

  <!-- Abstract botanical leaves (champagne gold lines) -->
  <g transform="translate(250,250) rotate(-15)">
    <!-- Main stem -->
    <path d="M 0,150 C -20,50 20,-50 0,-150" fill="none" stroke="url(#gold-grad)" stroke-width="2" stroke-linecap="round" />
    
    <!-- Leaves -->
    <path d="M 0,90 C 30,80 50,50 30,30 C 10,10 0,60 0,90 Z" fill="none" stroke="url(#gold-grad)" stroke-width="1.5" />
    <path d="M 0,30 C -30,20 -50,-10 -30,-30 C -10,-50 0,0 0,30 Z" fill="none" stroke="url(#gold-grad)" stroke-width="1.5" />
    
    <path d="M 0,-20 C 40,-30 60,-60 40,-80 C 20,-100 0,-50 0,-20 Z" fill="none" stroke="url(#gold-grad)" stroke-width="1.5" />
    <path d="M 0,-80 C -30,-90 -50,-120 -30,-140 C -10,-160 0,-110 0,-80 Z" fill="none" stroke="url(#gold-grad)" stroke-width="1.5" />
    
    <!-- Tiny radiating energy dots -->
    <circle cx="60" cy="-40" r="3" fill="#C5A880" opacity="0.8" />
    <circle cx="-60" cy="-60" r="2.5" fill="#E5C7A3" opacity="0.7" />
    <circle cx="80" cy="40" r="2" fill="#A88B62" opacity="0.6" />
    <circle cx="-70" cy="80" r="3.5" fill="#C5A880" opacity="0.9" />
  </g>
</svg>
