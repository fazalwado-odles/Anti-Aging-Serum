<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="silk-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8D3C7" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#F5EFEB" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#DFCEBA" stop-opacity="0.7" />
    </linearGradient>
    <radialGradient id="glow-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FAF7F2" stop-opacity="1" />
      <stop offset="80%" stop-color="#F5EFEB" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#FDFBF7" stop-opacity="0" />
    </radialGradient>
    <filter id="soft-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" />
    </filter>
  </defs>

  <circle cx="250" cy="250" r="200" fill="url(#glow-grad)" filter="url(#soft-blur)" />

  <!-- Smooth waving curves representing silk cloth flow -->
  <g opacity="0.85">
    <path d="M 50,300 C 150,200 200,400 300,250 C 400,100 420,280 450,200" fill="none" stroke="url(#silk-grad)" stroke-width="3" stroke-linecap="round" />
    <path d="M 60,320 C 160,220 210,420 310,270 C 410,120 430,300 460,220" fill="none" stroke="url(#silk-grad)" stroke-width="1.5" stroke-linecap="round" opacity="0.6" />
    <path d="M 40,280 C 140,180 190,380 290,230 C 390,80 410,260 440,180" fill="none" stroke="url(#silk-grad)" stroke-width="1" stroke-linecap="round" opacity="0.4" />
    
    <!-- Smooth curved ribbon shape -->
    <path d="M 80,180 Q 180,260 280,160 T 420,240 L 400,260 Q 300,180 200,280 T 80,180 Z" fill="url(#silk-grad)" opacity="0.25" />
    
    <!-- Tiny floating oil droplets -->
    <circle cx="180" cy="180" r="6" fill="#E8D3C7" opacity="0.7" />
    <circle cx="190" cy="170" r="2" fill="#FFF" opacity="0.9" />
    <circle cx="340" cy="280" r="4.5" fill="#DFCEBA" opacity="0.6" />
    <circle cx="345" cy="275" r="1.5" fill="#FFF" opacity="0.8" />
  </g>
</svg>
